<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fishy &#x1F41F; &ndash; Anmelden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f7ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .fishy-card { border-radius: 12px; box-shadow: 0 4px 24px rgba(0,119,182,0.15); border: none; }
        .btn-fishy { background: linear-gradient(90deg, #0077b6, #00b4d8); border: none; border-radius: 8px; }
        .btn-fishy:hover { background: linear-gradient(90deg, #005f92, #0099bb); }
    </style>
</head>
<body>
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card fishy-card" style="max-width:440px; width:100%;">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <img src="/favicon.svg" style="width:80px; border-radius:16px;" alt="Gravys"
                         onerror="this.style.display='none'">
                </div>
                <h3 class="text-center mb-1" style="color:#0077b6; font-weight:700;">Willkommen bei Gravys</h3>
                <p class="text-center text-muted mb-4" style="font-size:0.95rem;">
                    Graph visuals!
                </p>
                <hr>
                {% if error %}
                <div class="alert alert-danger py-2" style="font-size:0.9rem;">{{ error }}</div>
                {% endif %}
                <form method="post" autocomplete="on">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Benutzername</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                               placeholder="Dein Name..." autofocus required
                               value="{{ username_val }}">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Passwort</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               placeholder="Passwort..." required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 btn-fishy">
                        Anmelden &rarr;
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
